<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Default (Light Mode) */
    .bg { fill: #F2EFE8; }
    .text { fill: #0E0E0C; font-family: system-ui, -apple-system, sans-serif; font-size: 32px; font-weight: 600; letter-spacing: -1px; }
    .slash { fill: #55534B; }
    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0E0E0C; }
      .text { fill: #F2EFE8; }
      .slash { fill: #A7A498; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="24" />
  <text class="text" x="50" y="54" text-anchor="middle" dominant-baseline="middle">
    JFG<tspan class="slash">/</tspan>
  </text>
</svg>
